name: Build and Release

on:
  push:
    tags:
      - 'v*'  # v1.0.0, v1.0.1 등 태그 푸시 시 실행
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openpyxl pandas tkinterdnd2

      - name: 버전 정보 확인
        id: version
        shell: bash
        run: |
          VERSION=$(cat version.txt | tr -d '\r\n')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: PyInstaller로 exe 빌드
        run: |
          pyinstaller --onefile --windowed --name "order_processor" --add-data "version.txt;." main.py

      - name: exe 파일명 한글로 변경
        shell: powershell
        run: |
          Rename-Item -Path "dist\order_processor.exe" -NewName "발주서처리프로그램.exe"

      - name: Release 생성 및 exe 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 발주서처리프로그램 ${{ steps.version.outputs.version }}
          body: |
            ## 발주서처리프로그램 ${{ steps.version.outputs.version }}

            자동 빌드된 실행파일입니다.

            **[발주서처리프로그램.exe 다운로드](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/발주서처리프로그램.exe)**
          files: dist/발주서처리프로그램.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
